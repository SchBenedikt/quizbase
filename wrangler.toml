name = "quizbase"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

main = "src/worker.js"

[assets]
directory = ".next/deploy"
binding = "ASSETS"

[build]
command = "npm run build && cp -r .next/server/app .next/deploy/ && cp -r .next/static .next/deploy/"

[vars]
# Add environment variables here for Cloudflare deployment.
# Sensitive variables should be added via `wrangler secret put`.
