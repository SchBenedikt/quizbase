name = "quizbase"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

main = "src/worker.js"

[assets]
directory = ".next/deploy"
binding = "ASSETS"

[build]
command = "npm run build && rm -rf .next/deploy && mkdir -p .next/deploy/_next && cp -r .next/static .next/deploy/_next/ && cp -r .next/server/app/. .next/deploy/ && find .next/deploy -name '*.js' -exec sh -c 'mv \"$1\" \"${1%.js}.html\"' _ {} \\;"

[vars]
# Add environment variables here for Cloudflare deployment.
# Sensitive variables should be added via `wrangler secret put`.

# Custom domains for the worker
routes = [
  { pattern = "quizbase.xn--schchner-2za.de/*" }
]
